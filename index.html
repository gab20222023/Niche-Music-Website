<style>
    body {
        background-color:rgb(0, 0, 0);
    }

    h1 {
        font-family: 'Monospace', monospace;
        font-size: 60px;
        color: rgb(255, 255, 255);
        font-weight: bold;
    }

    h2 {
        font-family: 'Monospace', monospace;
        font-size: 15px;
        color: rgb(255, 255, 255);

    p {
        font-family: 'Monospace', monospace;
        font-size: 10px;
        color: rgb(255, 255, 255);
        font-weight: normal;
    }

    a {
        font-family: 'Monospace', monospace;
        font-size: 10px;
        color: rgb(255, 255, 255);
        font-weight: normal;
    }

    /* This is the CSS for the custom cursor. 
    (The idea is from https://dev.to/lensco825/how-to-make-a-custom-cursor-cursor-hover-effects-1ikg)*/
    .cursor {
        position: fixed;
        width: 10px;
        height: 10px;
        background-color: white;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: width 0.3s, height 0.3s;
        pointer-events: none;
    }

    * {
        cursor: none;
    }
</style>
