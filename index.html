    </head>
    <body>
        <h1>Niche-fy</h1>
        <hr>
        <h2>Welcome to Niche-fy, the ultimate website for</h2>
        <h2>discovering niche music from all over the world!</h2>
        <hr>
        <button onclick="spawnNextTrack()">Click Me to spawn the next track!</button>
        <hr>
        <iframe data-testid="embed-iframe" style="border-radius:12px" id="nicheTrack" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>

    <div id="cursor" class="cursor"></div>
    <script src="index.js"></script>

<style>
    ::selection {
        background-color: rgb(255, 132, 0);
        color: rgb(0, 0, 0);
    }

    body {
        background-color:rgb(0, 0, 0);
    }

    h1 {
        font-family: 'Monospace', monospace;
        font-size: 60px;
        color: rgb(255, 255, 255);
        font-weight: bold;
    }

    h2 {
        font-family: 'Monospace', monospace;
        font-size: 15px;
        color: rgb(255, 255, 255);
        font-weight: normal;
    }

    p {
        font-family: 'Monospace', monospace;
        font-size: 10px;
        color: rgb(255, 255, 255);
        font-weight: normal;
    }

    a {
        font-family: 'Monospace', monospace;
        font-size: 10px;
        color: rgb(255, 255, 255);
        font-weight: normal;
    }

    /* This is the CSS for the custom cursor. 
    (The idea is from https://dev.to/lensco825/how-to-make-a-custom-cursor-cursor-hover-effects-1ikg)*/
    .cursor {
        position: fixed;
        width: 10px;
        height: 10px;
        background-color: white;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: width 0.3s, height 0.3s;
        pointer-events: none;
    }

    * {
        cursor: none;
    }
</style>
